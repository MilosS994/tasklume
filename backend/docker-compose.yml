version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: tasklume-postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: tasklume_user
      POSTGRES_PASSWORD: tasklume_password
      POSTGRES_DB: tasklume_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
